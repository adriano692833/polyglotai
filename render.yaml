services:
  - type: web
    name: polyglotai
    runtime: node
    buildCommand: npm ci && npm run build && npx prisma generate
    startCommand: npx prisma migrate deploy && npx tsx server.ts
    healthCheckPath: /version
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: minimax/minimax-m2.5:free
      - key: SUPADATA_API_KEY
        sync: false
      - key: DEEPL_API_KEY
        sync: false
      - key: MYMEMORY_API_KEY
        sync: false

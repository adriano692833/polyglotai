steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - '--no-cache'
      - '--tag'
      - 'us-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/polyglotai:$COMMIT_SHA'
      - '--tag'
      - 'us-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/polyglotai:latest'
      - '-f'
      - 'Dockerfile'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - 'us-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/polyglotai:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - 'us-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/polyglotai:latest'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - polyglotai
      - '--image'
      - 'us-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/polyglotai:$COMMIT_SHA'
      - '--region'
      - 'us-west1'
      - '--allow-unauthenticated'
      - '--port'
      - '3000'
      - '--memory'
      - '512Mi'
      - '--set-env-vars'
      - 'NODE_ENV=production,DATABASE_URL=file:/data/db.sqlite,BUILD_ID=$COMMIT_SHA'

images:
  - 'us-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/polyglotai:$COMMIT_SHA'
  - 'us-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/polyglotai:latest'
